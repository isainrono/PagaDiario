version: "3.9"

services:
  backend:
    build:
      context: ./apps/backend
    container_name: pagadiario_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pagadiario:${DB_PASSWORD}@postgres:5432/pagadiario
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: pagadiario_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pagadiario
      POSTGRES_USER: pagadiario
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagadiario"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: pagadiario_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
